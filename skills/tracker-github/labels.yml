# GitHub Issues adapter — default label mapping.
#
# Two equivalent entry forms are supported:
#
#   1. Object form (preferred for the canonical Valesco set):
#        <canonical-name>:
#          name: <vendor-native string>
#          color: "<6-hex-char>"     # optional
#          description: "<text>"     # optional
#
#   2. Bare-string form (back-compat; preserved for per-repo overrides
#      that don't care about cosmetics):
#        <canonical-name>: <vendor-native string>
#
# The object form lets `apply_labels` lazily create missing labels on
# first use with the right color and description (per VA-283). Bare-string
# entries fall back to GitHub's default (gray, no description).
#
# GitHub's community-standard labels are lowercase and slightly different
# from Valesco's canonical names. This file maps both ways. Per-repo
# overrides land at `.afk/tracker-labels.yml` if a specific repo uses
# different strings (e.g., `bug:prod` instead of `bug`).
#
# See ../../docs/adr/0001-tracker-adapter-contract.md for the three-layer
# resolution rule (canonical → adapter default → per-repo override) and
# ./SKILL.md § Lazy label creation for the existence-check + create-if-
# missing flow `apply_labels` runs.

# Category labels — every actively-triaged issue has exactly one.
# GitHub's `bug` and `enhancement` labels exist by default on most
# repos; `improvement` is non-standard and the adapter creates it on
# first use if absent.
categories:
  Bug:
    name: bug
    color: "d73a4a"
    description: "Something isn't working"
  Feature:
    name: enhancement
    color: "a2eeef"
    description: "New feature or request"
  Improvement:
    name: improvement
    color: "0e8a16"
    description: "Polish, refactor, or quality work on existing functionality"

# State labels — at most one per issue. These match canonical names
# directly; GitHub repos using the flightplan triage funnel will have
# these labels created on first use via the lazy-create flow.
state_labels:
  needs-info:
    name: needs-info
    color: "fbca04"
    description: "Issue body lacks information needed to proceed; awaiting reporter input"
  needs-human:
    name: needs-human
    color: "fb6f1c"
    description: "A human should pick this up rather than the autonomous CLI"
  wontfix:
    name: wontfix
    color: "ffffff"
    description: "Decided not to address this issue"
  needs-triage:
    name: needs-triage
    color: "d4c5f9"
    description: "Awaiting initial triage classification"

# Status mapping — GitHub has no native status enum. The adapter
# encodes the canonical state machine via a combination of issue
# state (open/closed + state_reason) and a single state-encoding
# label that's mutually exclusive with other state-encoding labels.
#
# `state-encoding labels` is the set of labels that participate in
# status: { triage, backlog, todo, in-progress, in-review, reviewed }.
# When transitioning between OPEN canonical statuses, the adapter
# strips other state-encoding labels and applies the new one (see
# ./SKILL.md § Verifying the strip step).
#
# `state` and `state_reason` values are stored in lowercase here to
# match the canonical normalization; `gh issue view` returns uppercase
# (`OPEN`, `CLOSED`, `COMPLETED`) and the adapter lowercases on read
# before mapping (per VA-286).
statuses:
  triage:
    state: open
    label:
      name: triage
      color: "ededed"
      description: "Awaiting initial triage classification (state-encoding label)"
  backlog:
    state: open
    label:
      name: backlog
      color: "c5def5"
      description: "Triaged and parked; not active work (state-encoding label)"
  todo:
    state: open
    label:
      name: todo
      color: "0e8a16"
      description: "Brief in place; ready to be picked up (state-encoding label)"
  in-progress:
    state: open
    label:
      name: in-progress
      color: "fbca04"
      description: "Active work in progress (state-encoding label)"
  in-review:
    state: open
    label:
      name: in-review
      color: "5319e7"
      description: "Under review (state-encoding label)"
  reviewed:
    state: open
    label:
      name: reviewed
      color: "1f883d"
      description: "Review complete; ready for next stage (state-encoding label)"
  done:
    state: closed
    state_reason: completed
  canceled:
    state: closed
    state_reason: not_planned
  duplicate:
    state: closed
    state_reason: duplicate

# Non-canonical labels GitHub repos commonly carry — these are
# preserved on read (surfaced as `extra_labels` in the canonical issue
# shape) and untouched on write. The adapter is a good citizen on
# existing repos. Listed here for documentation only; no logic depends
# on this list.
preserved_extras:
  - good first issue
  - help wanted
  - documentation       # if a repo uses this for category, override above
  - duplicate            # GitHub default; harmless duplicate of state_reason
  - invalid              # GitHub default
  - question             # GitHub default
